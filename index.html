            fullDesc: "26 апреля 1986 года произошёл взрыв 4-го энергоблока. Выброс радиоактивных веществ в 400 раз превысил бомбу в Хиросиме. Зона отчуждения радиусом 30 км. Погибло 31 человек в первые месяцы, тысячи ликвидаторов и местных жителей получили большие дозы облучения. Героический подвиг академика Валерия Легасова: он руководил работами по ликвидации, настоял на строительстве саркофага (объект «Укрытие») и ввёл систему дозиметрического контроля. В 1987 году, выступая на Венецианской конференции, Легасов раскрыл подлинные масштабы аварии и причины (ошибки конструкции РБМК и персонала). Не выдержав травли, 27 апреля 1988 года покончил с собой, оставив предсмертную записку: «Аз воздам». Его имя навсегда вписано в историю ядерной безопасности. До сих пор действует саркофаг «Укрытие» и новый конфайнмент (2019)."
        };
        
        // --------------------------------------------------------------
        // БАЗА ДАННЫХ ПОЛИГОНОВ
        // --------------------------------------------------------------
        const testSites = [

            { name: "Невадский полигон", country: "США", lat: 37.114, lng: -116.048, years: "1951–1992", tests: 928, type: "Атмосферные, подземные", fullDesc: "Более 900 взрывов. Самый мощный атмосферный — «Hood» (74 кт, 1957). После 1963 года только подземные. В 1970 взрыв «Baneberry» вызвал выброс радиации на поверхность. Сейчас используется для тренировок спасателей." },
            { name: "Атолл Бикини", country: "США", lat: 11.600, lng: 165.400, years: "1946–1958", tests: 23, type: "Атмосферные, подводные", fullDesc: "1 марта 1954 года Castle Bravo (15 Мт) — в 1000 раз мощнее Хиросимы. Радиоактивные осадки поразили японскую рыболовную шхуну «Счастливый дракон». Атолл до сих пор непригоден для жизни. В 2010 году включён в список Всемирного наследия ЮНЕСКО." },

            { name: "Покхаран", country: "Индия", lat: 27.090, lng: 71.750, years: "1974, 1998", tests: 6, type: "Подземные", fullDesc: "18 мая 1974 года первое индийское испытание (12 кт) «Улыбающийся Будда». В 1998 году серия из пяти взрывов (до 45 кт). Индия объявила себя ядерной державой, что вызвало санкции." },
            { name: "Пунгери (КНДР)", country: "КНДР", lat: 41.280, lng: 129.070, years: "2006–2017", tests: 6, type: "Подземные", fullDesc: "Первое испытание 9 октября 2006 года (менее 1 кт). Самое мощное — 3 сентября 2017 года (120–250 кт). Вызвало искусственное землетрясение магнитудой 6,3. В 2018 году полигон объявлен закрытым." }

        const extraSites = [

        ];
        
        // --------------------------------------------------------------
        // КАРТА
        // --------------------------------------------------------------
        const map = L.map('map').setView([35, 20], 2.2);
        
        const russianLayer = L.tileLayer('https://{s}.tile.openstreetmap.ru/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors, Russia',
            subdomains: 'abc',
            maxZoom: 18
        }).addTo(map);
        
        const fallbackLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        });
        russianLayer.on('tileerror', () => {
            if (!map.hasLayer(fallbackLayer)) {
                map.removeLayer(russianLayer);
                fallbackLayer.addTo(map);
            }
        });
        
        const markersCluster = L.markerClusterGroup({
            spiderfyOnMaxZoom: true,
            maxClusterRadius: 55,
            iconCreateFunction: (cluster) => {
                const cnt = cluster.getChildCount();
                let bg = '#ff5e3a';
                if (cnt > 25) bg = '#c73c1a';
                else if (cnt > 10) bg = '#ff7e4a';
                return L.divIcon({
                    html: `<div style="background:${bg}; width:38px; height:38px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:white; font-weight:bold; border:2px solid white;">${cnt}</div>`,
                    iconSize: L.point(40, 40)
                });
            }
        });
        
        allSites.forEach(site => {
            let marker;
            if (site.name.includes("Чернобыль")) {
                const greenIcon = L.divIcon({
                    html: '<div style="background:#44aa44; width:28px; height:28px; border-radius:50%; border:2px solid white; box-shadow:0 0 8px #88ff88;"></div>',
                    iconSize: [28, 28],
                    className: 'green-marker-icon'
                });
                marker = L.marker([site.lat, site.lng], { icon: greenIcon, title: site.name });
            } else {
                marker = L.marker([site.lat, site.lng], { title: site.name });
            }
            marker.bindPopup(getPopupContent(site), { maxWidth: 370, minWidth: 260 });
            markersCluster.addLayer(marker);
        });
        map.addLayer(markersCluster);
        
        const polygonGroup = L.layerGroup();
        polygonsData.forEach(poly => {
            const polygon = L.polygon(poly.coords, { 
                color: poly.color, 
                weight: poly.weight, 
                opacity: poly.opacity, 
                fillOpacity: poly.fillOpacity
            }).bindTooltip(poly.name, { sticky: true });
            polygon.addTo(polygonGroup);
        });
        polygonGroup.addTo(map);
        
        L.control.layers(
            { "Русская карта": russianLayer, "Стандартная OSM": fallbackLayer },
            { "⚛️ Ядерные объекты": markersCluster, "📐 Границы полигонов": polygonGroup },
            { collapsed: false, position: 'topright' }
        ).addTo(map);
        
        document.getElementById('siteCountDisplay').innerHTML = `📍 ${allSites.length} объектов | ${polygonsData.length} территорий (включая зону ЧАЭС)`;
        
        const boundsGroup = L.featureGroup();
        allSites.forEach(s => boundsGroup.addLayer(L.marker([s.lat, s.lng])));
        polygonsData.forEach(p => boundsGroup.addLayer(L.polygon(p.coords)));
        const globalBounds = boundsGroup.getBounds();
        map.fitBounds(globalBounds.pad(0.15));
        
        const resetControl = L.Control.extend({
            options: { position: 'bottomcenter' },
            onAdd: () => {
                const btn = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                btn.innerHTML = '🌍 Сбросить вид';
                btn.style.cssText = 'background:white; padding:6px 14px; border-radius:30px; cursor:pointer; font-family:Inter; font-weight:500; margin-bottom:20px; box-shadow:0 2px 6px rgba(0,0,0,0.2);';
                btn.onclick = () => map.fitBounds(globalBounds.pad(0.15));
                return btn;
            }
        });
        map.addControl(resetControl);
        L.control.scale({ metric: true, imperial: false, position: 'bottomleft' }).addTo(map);
    </script>
</body>
</html>
